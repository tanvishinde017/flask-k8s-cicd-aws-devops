name: K8s CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # ✅ Build & Push with version tag
    - name: Build and Push Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-k8s-app:${{ github.sha }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/flask-k8s-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/flask-k8s-app:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/flask-k8s-app:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/flask-k8s-app:latest

    # ✅ Install kubectl
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    # ✅ AWS Login
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # ✅ Connect to EKS
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name flask-cluster --region ap-south-1

    # ✅ Deploy
    - name: Deploy to EKS
      run: kubectl apply -f k8s/